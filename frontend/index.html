<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/olivierlogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olivier Goudreault Portfolio</title>
    <meta name="description" content="Portfolio website for Olivier Goudreault, Computer Science Technology graduate and web developer." />
    <meta name="keywords" content="Olivier Goudreault, portfolio, web developer, projects, computer science, frontend, backend" />
    <meta name="author" content="Olivier Goudreault" />
    <meta property="og:title" content="Olivier Goudreault Portfolio" />
    <meta property="og:description" content="Portfolio website for Olivier Goudreault, Computer Science Technology graduate and web developer." />
    <meta property="og:image" content="/olivierlogo.png" />
    <meta property="og:type" content="website" />
    <!-- Ensure runtime access to the Turnstile site key (injected from Vite env) -->
    <meta name="turnstile-site-key" content="%VITE_CLOUDFLARE_TURNSTILE_SITE_KEY%">
    <!--
      DEV: a relaxed CSP to allow Turnstile scripts during local testing.
      This meta will be active in dev if you keep the placeholder value in .env and
      restart the dev server. Remove or tighten for production.
    -->
    %VITE_ALLOW_TURNSITLE_CSP_META%
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
