server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # SNI is required for HTTPS upstream (Render/Cloudflare)
        # However, for internal HTTP, we don't need SNI.
        # But if we switch back to external HTTPS, we might.
        # proxy_ssl_server_name on; # Only needed for HTTPS

        # Use a variable for the upstream to force runtime resolution
        # This prevents Nginx from crashing if the host is not found at startup
        # Remove specific resolver to let Nginx use system DNS (if simpler config used) 
        # or use Google DNS which is accessible? 
        # Actually, Render uses system DNS. 
        # If we use a variable in proxy_pass, we MUST define a resolver.
        # Valid resolvers on Render/Linux usually come from /etc/resolv.conf.
        # Since we can't easily know it dynamically in simple nginx.conf, 
        # we will use the trick of not using a variable for the hostname part if possible,
        # OR use a public resolver if we are using the public hostname (which we are now).
        
        resolver 8.8.8.8 valid=30s;
        set $upstream_endpoint ${API_URL};
        proxy_pass $upstream_endpoint;

        # Set Host header to the backend's hostname so Render routes correctly
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
