server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # SNI is required for HTTPS upstream (Render/Cloudflare)
        # However, for internal HTTP, we don't need SNI.
        # But if we switch back to external HTTPS, we might.
        # proxy_ssl_server_name on; # Only needed for HTTPS

        # Use a variable for the upstream to force runtime resolution
        # This prevents Nginx from crashing if the host is not found at startup
        resolver 127.0.0.11 valid=30s;
        set $upstream_endpoint ${API_URL};
        proxy_pass $upstream_endpoint;

        # Set Host header to the backend's hostname so Render routes correctly
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
